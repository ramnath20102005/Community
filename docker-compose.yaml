version: "3.9"
services:
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    image: realchat-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/realchat
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    image: realchat-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: realchat-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=realchat

volumes:
  mongo-data:
